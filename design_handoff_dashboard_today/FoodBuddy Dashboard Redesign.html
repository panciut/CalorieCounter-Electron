<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<title>FoodBuddy — Dashboard Redesign</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --font-display: "Inter Tight", system-ui, sans-serif;
    --font-body: "Inter", system-ui, sans-serif;
    --font-serif: "Fraunces", "Iowan Old Style", Georgia, serif;
    --font-mono: "JetBrains Mono", ui-monospace, monospace;
  }
  html, body { margin: 0; background: #1a1814; font-family: var(--font-body); color: #e9e6e0; }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { overflow: hidden; }
  .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

  /* hide scrollbar utility (matches existing app) */
  .hide-scrollbar { scrollbar-width: none; }
  .hide-scrollbar::-webkit-scrollbar { display: none; }

  /* shared scrollbar look */
  .nice-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  .nice-scroll::-webkit-scrollbar-track { background: transparent; }
  .nice-scroll::-webkit-scrollbar-thumb { background: rgba(120,110,95,0.25); border-radius: 99px; }
  .nice-scroll::-webkit-scrollbar-thumb:hover { background: rgba(120,110,95,0.45); }

  @keyframes fb-fade-up {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fb-pop {
    0% { transform: scale(1); }
    35% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  @keyframes fb-row-in {
    from { opacity: 0; transform: translateX(-8px); background: rgba(196,92,0,0.12); }
    to { opacity: 1; transform: translateX(0); background: transparent; }
  }
  @keyframes fb-toast-in {
    from { opacity: 0; transform: translateY(8px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="fb-data.jsx"></script>
<script type="text/babel" src="fb-icons.jsx"></script>
<script type="text/babel" src="fb-shared.jsx"></script>
<script type="text/babel" src="fb-variant-swiss.jsx"></script>
<script type="text/babel" src="fb-variant-dense.jsx"></script>
<script type="text/babel" src="fb-variant-editorial.jsx"></script>
<script type="text/babel" src="fb-variant-hybrid.jsx"></script>
<script type="text/babel" src="fb-foods-screen.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="fb-app.jsx"></script>
</body>
</html>
